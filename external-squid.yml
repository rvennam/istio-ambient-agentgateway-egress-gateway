# Alternative: use an AgentgatewayBackend for external proxies not running as K8s Services.
# For in-cluster proxies, prefer using a Service backendRef directly (see httpbin-se.yml).
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: httpbingo-tunnel
  namespace: common-infrastructure
spec:
  targetRefs:
    - name: httpbingo-static
      kind: ServiceEntry
      group: networking.istio.io
  backend:
    tunnel:
      backendRef:
        name: corporate-proxy
        kind: Service
        namespace: corporate-proxy
        port: 3128
